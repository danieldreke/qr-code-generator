<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>QR Code Offline Generator</title>
  <!-- https://github.com/KeeeX/qrcodejs/ -->
  <link rel="stylesheet" href="style.css">
  <script src="./assets/qrcode.min.keeex.js" defer></script>
  <script src="script.js" defer></script>
  <link rel="icon" href="./favicon.png" type="image/x-icon">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#111111">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="QR Code Generator">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="apple-touch-icon" href="./assets/icon-512.png">
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>QR Code Offline Generator</h1>
      <button id="dark-mode-toggle" onclick="toggleDarkMode()"></button>
    </div>
    <textarea id="qr-content" placeholder="Enter or paste text or link here"></textarea>
    <div class="button-container">
      <button onclick="deleteContent()">CLEAR</button>
      <button onclick="undo()">UNDO</button>
      <button onclick="saveQRpng()">SAVE PNG</button>
      <div class="menu-wrapper">
        <button id="menu-btn" onclick="toggleMenu(event)">&#xFE19;</button>
        <div id="menu-dropdown" class="menu-dropdown" hidden>
          <button onclick="copyQRsvg(); closeMenu()">COPY SVG</button>
          <button onclick="copyQRpng(); closeMenu()">COPY PNG</button>
          <button onclick="saveQRsvg(); closeMenu()">SAVE SVG</button>
        </div>
      </div>
    </div>
    <div id="qrcode"></div>
  </div>
  <div id="toast-container"></div>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./serviceworker.js');
    }
  </script>
</body>

</html>
